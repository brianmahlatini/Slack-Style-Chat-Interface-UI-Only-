<div class="min-h-screen bg-ink-900 text-white bg-grid">
  <div class="grid grid-cols-[56px_1fr] sm:grid-cols-[64px_1fr] md:grid-cols-[80px_240px_1fr] xl:grid-cols-[80px_260px_1fr_320px] min-h-screen">
    <app-sidebar></app-sidebar>
    <app-channel-list></app-channel-list>

    <main class="flex flex-col min-w-0">
      <header class="px-4 sm:px-6 md:px-8 pt-5 pb-4 border-b border-white/5 bg-ink-900/80 backdrop-blur">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 md:gap-6">
          <div class="min-w-0">
            <ng-container *ngIf="activeChannel$ | async as channel">
              <h1 class="text-xl sm:text-2xl font-display truncate">#{{ channel.name }}</h1>
              <p class="text-[12px] text-ink-300 mt-1 truncate">{{ channel.topic }}</p>
            </ng-container>
          </div>
          <div class="w-full md:w-80">
            <app-search-bar></app-search-bar>
          </div>
        </div>
      </header>

      <div class="grid grid-cols-1 xl:grid-cols-[1fr_320px] gap-6 px-4 sm:px-6 md:px-8 py-5 sm:py-6 flex-1 overflow-hidden">
        <section class="flex flex-col gap-4">
          <app-pinned-bar></app-pinned-bar>
          <div class="flex-1 bg-ink-800/30 rounded-2xl border border-white/5 overflow-hidden">
            <app-message-list></app-message-list>
          </div>
          <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
            <app-typing-indicator></app-typing-indicator>
            <span class="text-[11px] text-ink-400">Virtualized · Infinite scroll</span>
          </div>
          <app-message-composer></app-message-composer>
        </section>

        <aside class="h-full hidden xl:block">
          <app-thread-panel></app-thread-panel>
        </aside>
      </div>
    </main>
  </div>
</div>
