<div class="min-h-screen bg-ink-900 text-white bg-aurora">
  <div class="grid grid-cols-[56px_1fr] sm:grid-cols-[64px_1fr] md:grid-cols-[80px_200px_1fr] xl:grid-cols-[80px_220px_1fr_280px] min-h-screen">
    <app-sidebar></app-sidebar>
    <app-channel-list></app-channel-list>

    <main class="flex flex-col min-w-0">
      <header class="px-4 sm:px-6 md:px-8 pt-6 pb-5 border-b border-white/5 bg-ink-900/60 backdrop-blur">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-5 md:gap-6">
          <div class="min-w-0">
            <ng-container *ngIf="activeChannel$ | async as channel">
              <div class="flex items-center gap-3">
                <div class="h-10 w-10 rounded-2xl bg-ink-700/80 border border-white/5 grid place-items-center text-sm">
                  {{ channel.type === 'private' ? '🔒' : '#' }}
                </div>
                <div class="min-w-0">
                  <h1 class="text-xl sm:text-2xl font-display truncate">#{{ channel.name }}</h1>
                  <p class="text-[12px] text-ink-300 mt-1 truncate">{{ channel.topic }}</p>
                </div>
              </div>
            </ng-container>
          </div>
          <div class="flex flex-col sm:flex-row sm:items-center gap-3 w-full md:w-auto">
            <div class="w-full md:w-80">
              <app-search-bar></app-search-bar>
            </div>
            <div class="flex items-center gap-2 text-[11px] text-ink-300">
              <span class="px-3 py-1 rounded-full border border-white/10 bg-ink-800/50">Live</span>
              <span class="px-3 py-1 rounded-full border border-white/10 bg-ink-800/50">24 online</span>
            </div>
          </div>
        </div>
      </header>

      <div class="grid grid-cols-[minmax(0,1fr)_260px] lg:grid-cols-[minmax(0,1fr)_280px] xl:grid-cols-[minmax(0,1fr)_300px] gap-6 px-4 sm:px-6 md:px-8 py-5 sm:py-6 flex-1 overflow-hidden">
        <section class="flex flex-col gap-5 min-w-0">
          <app-pinned-bar></app-pinned-bar>
          <div class="flex-1 min-h-[520px] rounded-2xl panel overflow-hidden">
            <app-message-list></app-message-list>
          </div>
          <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
            <app-typing-indicator></app-typing-indicator>
            <span class="text-[11px] text-ink-400">Virtualized · Infinite scroll</span>
          </div>
          <app-message-composer></app-message-composer>
        </section>

        <aside class="h-full">
          <app-thread-panel></app-thread-panel>
        </aside>
      </div>
    </main>
  </div>
</div>
