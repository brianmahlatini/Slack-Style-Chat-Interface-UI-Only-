<div class="h-full flex flex-col bg-ink-800 border-r border-white/5 min-w-0">
  <div class="px-3 sm:px-5 pt-5 sm:pt-6">
    <h2 class="font-display text-base sm:text-lg truncate">Orbit Workspace</h2>
    <p class="text-[11px] sm:text-xs text-ink-200 mt-1 truncate">4 teams · 18 members</p>
  </div>

  <div class="px-3 sm:px-5 mt-5 sm:mt-6">
    <p class="uppercase text-[10px] tracking-[0.2em] text-ink-300">Channels</p>
  </div>

  <div class="mt-3 flex-1 overflow-y-auto scrollbar-hide px-2" tabindex="0">
    <div
      *ngFor="let channel of channels$ | async; let i = index; trackBy: trackById"
      class="px-2 sm:px-3 py-2 rounded-xl mb-1 cursor-pointer transition min-w-0"
      [class.bg-ink-700]="(activeChannelId$ | async) === channel.id"
      [class.text-white]="(activeChannelId$ | async) === channel.id"
      [class.text-ink-200]="(activeChannelId$ | async) !== channel.id"
      [class.ring-1]="focusedIndex === i"
      [class.ring-lime-500]="focusedIndex === i"
      (click)="selectChannel(channel, i)"
    >
      <div class="flex items-center justify-between gap-2 min-w-0">
        <div class="flex items-center gap-2 min-w-0">
          <span class="text-xs">
            {{ channel.type === 'dm' ? 'DM' : channel.type === 'private' ? '🔒' : '#' }}
          </span>
          <span class="text-sm truncate">{{ channel.name }}</span>
        </div>
        <span
          *ngIf="channel.unreadCount > 0"
          class="text-[10px] px-2 py-0.5 rounded-full bg-coral-500 text-white"
          >{{ channel.unreadCount }}</span
        >
      </div>
      <p class="text-[10px] sm:text-[11px] text-ink-300 mt-1 truncate">{{ channel.topic }}</p>
    </div>
  </div>
</div>
