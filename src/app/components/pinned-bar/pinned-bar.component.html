<div class="panel rounded-2xl p-4">
  <div class="flex items-center justify-between mb-3">
    <div>
      <h3 class="text-sm font-semibold">Pinned</h3>
      <p class="text-[11px] text-ink-300">Keep mission-critical notes visible</p>
    </div>
    <span class="text-[10px] text-ink-300 px-2 py-1 rounded-full border border-white/10">Quick access</span>
  </div>
  <div class="space-y-3 max-h-56 overflow-y-auto scrollbar-hide">
    <div
      *ngFor="let message of pinnedMessages$ | async"
      class="text-xs bg-ink-700/60 rounded-xl p-3 border border-white/5"
    >
      <div class="flex items-center justify-between">
        <span class="text-ink-200">{{ message.author }}</span>
        <span class="text-[10px] text-ink-300">{{ message.timestamp | date: 'shortTime' }}</span>
      </div>
      <p class="mt-2 text-ink-100 leading-relaxed">{{ message.content }}</p>
    </div>
    <div *ngIf="(pinnedMessages$ | async)?.length === 0" class="text-xs text-ink-300">
      No pins yet. Pin a message to keep it in sight.
    </div>
  </div>
</div>
